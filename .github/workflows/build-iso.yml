name: Build Colin OS ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    env:
      COLIN_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo bash build/install-deps.sh

      - name: Build ISO
        run: sudo -E bash build/build.sh "${COLIN_VERSION}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: colin-os-${{ env.COLIN_VERSION }}
          path: |
            out/iso/*
            out/logs/*
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" out/iso/* --clobber
          else
            gh release create "${TAG_NAME}" out/iso/* --title "Colin OS ${TAG_NAME}" --generate-notes
          fi
